name: Release Nightly

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  publish:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect nightly-eligible base version
        id: eligibility
        shell: bash
        run: |
          base_version="$(sed -n 's/^Version: //p' plugin.php | head -n 1 | tr -d '\r')"
          echo "base_version=${base_version}" >> "${GITHUB_OUTPUT}"

          if [[ "${base_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-dev$ ]]; then
            echo "publish=true" >> "${GITHUB_OUTPUT}"
          else
            echo "publish=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Derive nightly version
        if: steps.eligibility.outputs.publish == 'true'
        id: nightly
        shell: bash
        run: |
          nightly_version="$(./bin/nightly-version)"
          echo "version=${nightly_version}" >> "${GITHUB_OUTPUT}"

      - name: Stamp nightly version into plugin metadata
        if: steps.eligibility.outputs.publish == 'true'
        shell: bash
        run: ./bin/set-version "${{ steps.nightly.outputs.version }}"

      - name: Build plugin zip from stamped worktree
        if: steps.eligibility.outputs.publish == 'true'
        id: build
        shell: bash
        run: |
          zip_name="tasty-fonts-${{ steps.nightly.outputs.version }}.zip"
          checksum_name="${zip_name}.sha256"

          git add plugin.php
          git archive \
            --format=zip \
            --prefix=etch-fonts/ \
            -o "${zip_name}" \
            "$(git write-tree)"
          git restore --staged plugin.php
          sha256sum "${zip_name}" > "${checksum_name}"

          echo "zip_name=${zip_name}" >> "${GITHUB_OUTPUT}"
          echo "checksum_name=${checksum_name}" >> "${GITHUB_OUTPUT}"

      - name: Generate nightly release notes
        if: steps.eligibility.outputs.publish == 'true'
        shell: bash
        run: |
          previous_reference="$(
            git tag --list '*-dev.*' --sort=version:refname | tail -n 1
          )"

          if [ -z "${previous_reference}" ]; then
            previous_reference="$(
              git tag --list --sort=version:refname \
                | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$' \
                | tail -n 1
            )"
          fi

          {
            echo "## What's Changed"
            echo
            if [ -n "${previous_reference}" ]; then
              git log --format='- %s (%h)' "${previous_reference}..${GITHUB_SHA}"
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_reference}...${GITHUB_SHA}"
            else
              git log --format='- %s (%h)' -n 20 "${GITHUB_SHA}"
            fi
          } > release-notes.md

      - name: Publish nightly prerelease
        if: steps.eligibility.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag_name="${{ steps.nightly.outputs.version }}"
          release_name="Tasty Custom Fonts ${tag_name}"
          zip_name="${{ steps.build.outputs.zip_name }}"
          checksum_name="${{ steps.build.outputs.checksum_name }}"

          gh release create "${tag_name}" "${zip_name}" "${checksum_name}" \
            --title "${release_name}" \
            --notes-file release-notes.md \
            --prerelease

      - name: Prune older nightly prereleases
        if: steps.eligibility.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -t old_tags < <(
            gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              | jq -r '.[] | select(.prerelease and (.tag_name | test("-dev\\.[0-9]+$"))) | .tag_name' \
              | sort -rV \
              | tail -n +11
          )

          for tag_name in "${old_tags[@]}"; do
            gh release delete "${tag_name}" --cleanup-tag -y
          done

      - name: Skip nightly publish on non-dev main
        if: steps.eligibility.outputs.publish != 'true'
        shell: bash
        run: |
          echo "Skipping nightly publish because main is on ${{ steps.eligibility.outputs.base_version }}, not an X.Y.Z-dev base."
