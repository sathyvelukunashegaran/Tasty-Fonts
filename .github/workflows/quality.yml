name: Shared Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Composer dependencies
        shell: bash
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install npm dev tooling
        shell: bash
        run: npm ci

      - name: Lint PHP sources
        shell: bash
        run: find . -name '*.php' -not -path './output/*' -not -path './tmp/*' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l

      - name: Lint CSS sources
        shell: bash
        run: npm run lint:css

      - name: Run Impeccable design anti-pattern scan
        shell: bash
        run: npm run lint:design

      - name: Run PHPStan
        shell: bash
        run: composer phpstan

      - name: Run PHP test suite
        shell: bash
        run: php tests/run.php

      - name: Run JS contract tests
        shell: bash
        run: node --test tests/js/*.test.cjs

      - name: Run bin script tests
        shell: bash
        run: bash tests/bin/release-scripts.test.sh

      - name: Run jscpd source duplication scan
        shell: bash
        run: bin/run-jscpd
